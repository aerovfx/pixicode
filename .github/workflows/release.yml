# Pixicode Release

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: true
          prerelease: false

  # Build for all platforms
  build:
    name: Build
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: pixicode
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: pixicode
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: pixicode
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: pixicode
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: pixicode.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          target: ${{ matrix.target }}
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --workspace --target ${{ matrix.target }} --release
      
      - name: Create archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../../pixicode-${{ matrix.target }}.zip ${{ matrix.artifact_name }}
          else
            tar czvf ../../../pixicode-${{ matrix.target }}.tar.gz ${{ matrix.artifact_name }}
          fi
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./pixicode-${{ matrix.target }}.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
          asset_name: pixicode-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
          asset_content_type: application/${{ matrix.os == 'windows-latest' && 'zip' || 'gzip' }}

  # Publish to crates.io (optional)
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Publish pixicode-types
        run: cargo publish -p pixicode-types --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
      
      - name: Publish pixicode-core
        run: cargo publish -p pixicode-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

  # Homebrew release (optional)
  homebrew:
    name: Homebrew Release
    runs-on: macos-latest
    needs: build
    steps:
      - name: Update Homebrew formula
        run: |
          echo "Homebrew release would be triggered here"
          # This would typically use a workflow_dispatch to update homebrew-pixicode repo
        continue-on-error: true
