name: pixicode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pixicode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /pixicode') ||
      startsWith(github.event.comment.body, '/pixicode')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run pixicode
        uses: anomalyco/pixicode/github@latest
        env:
          PIXICODE_API_KEY: ${{ secrets.PIXICODE_API_KEY }}
          PIXICODE_PERMISSION: '{"bash": "deny"}'
        with:
          model: pixicode/claude-opus-4-5
