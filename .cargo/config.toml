# cargo build configuration for pixicode workspace

[build]
# Use all available CPUs for compilation

[profile.dev]
opt-level = 0
debug = true
incremental = true
split-debuginfo = "unpacked"   # faster link on macOS

[profile.dev.package."*"]
# Optimize dependencies even in dev builds (backtraces, perf)
opt-level = 1

[profile.release]
opt-level = 3
lto = "thin"
strip = true
codegen-units = 1
panic = "abort"

[profile.release-debug]
inherits = "release"
debug = true
strip = false

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-gnu]
# Use mold linker when available (much faster link times)
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
